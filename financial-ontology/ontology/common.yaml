# Financial Ontology — Common (K-IFRS 골격)
# 한국 상장사(KOSPI/KOSDAQ) 공시를 1차 대상으로 한다. 한국어 계정명을 정준(canonical)으로 사용.
# 본 파일은 모든 산업 extension(manufacturing/bank/insurance/securities)의 부모가 되는 공통 온톨로지.
# ID 규칙: {STATEMENT}_{CATEGORY}_{ACCOUNT}, 한번 부여되면 변경 금지.
version: "1.0.0"

metadata:
  name: "재무 온톨로지 — 공통(K-IFRS)"
  description: "K-IFRS 기반 공통 재무제표 온톨로지. BS/IS/CI/SCE/CF 5개 명세서를 포괄하며 산업 extension이 상속·확장한다."
  standards: ["K-IFRS", "IFRS", "DART_XBRL"]
  industries: ["common", "manufacturing", "bank", "insurance", "securities"]
  created: "2026-07-22"
  updated: "2026-07-23"

ontology:
  statements:
    BALANCE_SHEET:
      id: BALANCE_SHEET
      name: "재무상태표"
      type: balance_sheet
      description: "특정 시점의 자산·부채·자본 상태. 자산 = 부채 + 자본."
      order: 1
    INCOME_STATEMENT:
      id: INCOME_STATEMENT
      name: "손익계산서"
      type: income_statement
      description: "기간 중 수익·비용을 대비하여 당기순이익을 산출."
      order: 2
    COMPREHENSIVE_INCOME:
      id: COMPREHENSIVE_INCOME
      name: "기타포괄손익"
      type: comprehensive_income
      description: "당기순이익에 반영되지 않는 기타포괄손익 항목과 포괄손익 합계."
      order: 3
    CHANGES_IN_EQUITY:
      id: CHANGES_IN_EQUITY
      name: "자본변동표"
      type: changes_in_equity
      description: "기초·기말 자본과 그 사이의 자본 변동 사유를 명시."
      order: 4
    CASH_FLOW:
      id: CASH_FLOW
      name: "현금흐름표"
      type: cash_flow
      description: "영업·투자·재무 활동에 의한 현금의 증감을 표시."
      order: 5

  accounts:
    # =========================================================================
    # 재무상태표 — 자산
    # =========================================================================
    BS_A_TOTAL:
      id: BS_A_TOTAL
      korean_name: "자산총계"
      english_name: "Total Assets"
      name: "자산총계"
      statement: [balance_sheet]
      category: [asset, total]
      sign: positive
      children: [BS_CA_TOTAL, BS_NCA_TOTAL]
      formula: "BS_CA_TOTAL + BS_NCA_TOTAL"
      ratios: [asset_turnover, roa, debt_ratio, equity_ratio]
      affects: [AssetBase]
      aliases: ["총자산", "자산의 총액"]
      mappings:
        dart: ["ifrs-full_Assets"]
        ifrs: ["Assets"]
        usgaap: ["Assets"]
      description: "유동자산과 비유동자산의 합. 기업 규모의 기준."

    BS_CA_TOTAL:
      id: BS_CA_TOTAL
      korean_name: "유동자산"
      english_name: "Current Assets"
      name: "유동자산"
      statement: [balance_sheet]
      category: [asset, current_asset, working_capital]
      sign: positive
      parent: BS_A_TOTAL
      children: [BS_CA_CASH, BS_CA_ST_FIN, BS_CA_AR, BS_CA_ST_INV, BS_CA_INV, BS_CA_PREPAID, BS_CA_OTHER, BS_CA_HOLD_FOR_SALE]
      formula: "BS_CA_CASH + BS_CA_ST_FIN + BS_CA_AR + BS_CA_ST_INV + BS_CA_INV + BS_CA_PREPAID + BS_CA_OTHER + BS_CA_HOLD_FOR_SALE"
      ratios: [current_ratio, quick_ratio, cash_ratio, working_capital]
      affects: [WorkingCapital]
      aliases: ["유동자산의 총액"]
      mappings:
        dart: ["ifrs-full_CurrentAssets"]
        ifrs: ["CurrentAssets"]
        usgaap: ["AssetsCurrent"]

    BS_CA_CASH:
      id: BS_CA_CASH
      korean_name: "현금및현금성자산"
      english_name: "Cash and Cash Equivalents"
      name: "현금및현금성자산"
      statement: [balance_sheet, cash_flow]
      category: [asset, current_asset, working_capital, cash]
      sign: positive
      parent: BS_CA_TOTAL
      ratios: [current_ratio, quick_ratio, cash_ratio, cash_flow_adequacy]
      affects: [WorkingCapital, Liquidity]
      cashflow_mapping: [operating]
      aliases: ["현금예금", "현금및예금"]
      mappings:
        dart: ["ifrs-full_CashAndCashEquivalents"]
        ifrs: ["CashAndCashEquivalents"]
        usgaap: ["CashAndCashEquivalentsAtCarryingValue"]
      description: "즉시 지급수단이 되는 현금과 단기 예금."

    BS_CA_ST_FIN:
      id: BS_CA_ST_FIN
      korean_name: "단기금융자산"
      english_name: "Short-term Financial Assets"
      name: "단기금융자산"
      statement: [balance_sheet]
      category: [asset, current_asset, financial_asset]
      sign: positive
      parent: BS_CA_TOTAL
      ratios: [quick_ratio]
      aliases: ["단기금융상품", "매매목적단기금융자산"]
      description: "단기적 자금운용 목적의 금융자산(만기 1년 이내)."

    BS_CA_AR:
      id: BS_CA_AR
      korean_name: "매출채권"
      english_name: "Accounts Receivable, Net"
      name: "매출채권"
      statement: [balance_sheet]
      category: [asset, current_asset, working_capital, receivable]
      sign: positive
      parent: BS_CA_TOTAL
      children: [BS_CA_AR_GROSS, BS_CA_AR_ALLOWANCE]
      ratios: [receivable_turnover, cash_conversion_cycle, current_ratio, quick_ratio]
      affects: [WorkingCapital, OCF]
      cashflow_mapping: [operating]
      aliases: ["외상매출금", "미수금", "Trade Receivables"]
      mappings:
        dart: ["ifrs-full_TradeAndOtherCurrentReceivables"]
        ifrs: ["TradeAndOtherCurrentReceivables"]
        usgaap: ["AccountsReceivableNetCurrent"]
      description: "상품·용역 판매로 발생한 채권(대손충당금 차감 후 순액)."

    BS_CA_AR_GROSS:
      id: BS_CA_AR_GROSS
      korean_name: "매출채권(총액)"
      english_name: "Accounts Receivable, Gross"
      name: "매출채권(총액)"
      statement: [balance_sheet]
      category: [asset, current_asset, receivable]
      sign: positive
      parent: BS_CA_AR
      aliases: ["매출채권 총액"]

    BS_CA_AR_ALLOWANCE:
      id: BS_CA_AR_ALLOWANCE
      korean_name: "대손충당금"
      english_name: "Allowance for Doubtful Accounts"
      name: "대손충당금"
      statement: [balance_sheet]
      category: [asset, current_asset, receivable, contra_asset]
      sign: negative
      parent: BS_CA_AR
      aliases: ["매출채권대손충당금"]
      description: "매출채권 회수불능 추정액. 매출채권에서 차감(음수 표기)."

    BS_CA_ST_INV:
      id: BS_CA_ST_INV
      korean_name: "단기투자자산"
      english_name: "Short-term Investments"
      name: "단기투자자산"
      statement: [balance_sheet]
      category: [asset, current_asset, investment]
      sign: positive
      parent: BS_CA_TOTAL
      ratios: [quick_ratio]
      aliases: ["단기투자", "매매목적투자증권"]
      description: "1년 이내 처분 예정인 투자유가증권."

    BS_CA_INV:
      id: BS_CA_INV
      korean_name: "재고자산"
      english_name: "Inventories"
      name: "재고자산"
      statement: [balance_sheet]
      category: [asset, current_asset, working_capital, inventory]
      sign: positive
      parent: BS_CA_TOTAL
      ratios: [inventory_turnover, cash_conversion_cycle, current_ratio]
      affects: [WorkingCapital, OCF]
      cashflow_mapping: [operating]
      aliases: ["재고", "Inventories"]
      mappings:
        dart: ["ifrs-full_Inventories"]
        ifrs: ["Inventories"]
        usgaap: ["InventoryNet"]
      description: "상품·제품·재공품·원재료 등 판매 또는 생산 목적 보유 자산."

    BS_CA_PREPAID:
      id: BS_CA_PREPAID
      korean_name: "선급금"
      english_name: "Prepaid Expenses"
      name: "선급금"
      statement: [balance_sheet]
      category: [asset, current_asset, working_capital, prepaid]
      sign: positive
      parent: BS_CA_TOTAL
      aliases: ["선급비용", "선수금(자산)"]
      description: "선급된 비용 중 차기 이후에 비용화될 금액."

    BS_CA_OTHER:
      id: BS_CA_OTHER
      korean_name: "기타유동자산"
      english_name: "Other Current Assets"
      name: "기타유동자산"
      statement: [balance_sheet]
      category: [asset, current_asset, other]
      sign: positive
      parent: BS_CA_TOTAL
      aliases: ["미수수익", "기타의 유동자산"]
      mappings:
        dart: ["ifrs-full_OtherCurrentAssets"]
        ifrs: ["OtherCurrentAssets"]
        usgaap: ["OtherAssetsCurrent"]

    BS_CA_HOLD_FOR_SALE:
      id: BS_CA_HOLD_FOR_SALE
      korean_name: "유동재분류자산"
      english_name: "Non-current Assets Held for Sale (Current)"
      name: "처분목적보유유동자산"
      statement: [balance_sheet]
      category: [asset, current_asset, held_for_sale]
      sign: positive
      parent: BS_CA_TOTAL
      aliases: ["처분목적보유자산", "유동으로 재분류된 비유동자산"]
      description: "처분목적 보유로 유동으로 재분류된 비유동자산."

    BS_NCA_TOTAL:
      id: BS_NCA_TOTAL
      korean_name: "비유동자산"
      english_name: "Non-current Assets"
      name: "비유동자산"
      statement: [balance_sheet]
      category: [asset, non_current_asset]
      sign: positive
      parent: BS_A_TOTAL
      children: [BS_NCA_LT_FIN, BS_NCA_LT_INV, BS_NCA_INV_PROP, BS_NCA_PPE, BS_NCA_INTANGIBLE, BS_NCA_ROU, BS_NCA_DTA, BS_NCA_GW, BS_NCA_OTHER]
      formula: "BS_CA_TOTAL 이외 비유동 계정의 합"
      aliases: ["비유동자산의 총액"]
      mappings:
        dart: ["ifrs-full_NoncurrentAssets"]
        ifrs: ["NonCurrentAssets"]
        usgaap: ["AssetsNonCurrent"]

    BS_NCA_LT_FIN:
      id: BS_NCA_LT_FIN
      korean_name: "장기금융자산"
      english_name: "Long-term Financial Assets"
      name: "장기금융자산"
      statement: [balance_sheet]
      category: [asset, non_current_asset, financial_asset]
      sign: positive
      parent: BS_NCA_TOTAL
      aliases: ["장기금융상품"]

    BS_NCA_LT_INV:
      id: BS_NCA_LT_INV
      korean_name: "장기투자자산"
      english_name: "Long-term Investments"
      name: "장기투자자산"
      statement: [balance_sheet]
      category: [asset, non_current_asset, investment]
      sign: positive
      parent: BS_NCA_TOTAL
      cashflow_mapping: [investing]
      aliases: ["장기성투자", "투자유가증권"]
      affects: [FCF]

    BS_NCA_INV_PROP:
      id: BS_NCA_INV_PROP
      korean_name: "투자부동산"
      english_name: "Investment Property"
      name: "투자부동산"
      statement: [balance_sheet]
      category: [asset, non_current_asset, investment_property]
      sign: positive
      parent: BS_NCA_TOTAL
      aliases: ["투자용부동산"]
      mappings:
        dart: ["ifrs-full_InvestmentProperty"]
        ifrs: ["InvestmentProperty"]
        usgaap: ["InvestmentProperty"]

    BS_NCA_PPE:
      id: BS_NCA_PPE
      korean_name: "유형자산"
      english_name: "Property, Plant and Equipment"
      name: "유형자산"
      statement: [balance_sheet]
      category: [asset, non_current_asset, ppe]
      sign: positive
      parent: BS_NCA_TOTAL
      ratios: [fixed_asset_turnover]
      affects: [FCF, CAPEX]
      cashflow_mapping: [investing]
      aliases: ["유형자산(순액)", "PropertyPlantAndEquipment"]
      mappings:
        dart: ["ifrs-full_PropertyPlantAndEquipment"]
        ifrs: ["PropertyPlantAndEquipment"]
        usgaap: ["PropertyPlantAndEquipmentNet"]
      description: "영업 활동에 1년 이상 사용되는 유형 자산(감가상각 후 순액)."

    BS_NCA_INTANGIBLE:
      id: BS_NCA_INTANGIBLE
      korean_name: "무형자산"
      english_name: "Intangible Assets"
      name: "무형자산"
      statement: [balance_sheet]
      category: [asset, non_current_asset, intangible]
      sign: positive
      parent: BS_NCA_TOTAL
      children: [BS_NCA_GW]
      affects: [FCF]
      cashflow_mapping: [investing]
      aliases: ["무형자산(순액)"]
      mappings:
        dart: ["ifrs-full_IntangibleAssets"]
        ifrs: ["IntangibleAssets"]
        usgaap: ["IntangibleAssetsNet"]

    BS_NCA_GW:
      id: BS_NCA_GW
      korean_name: "영업권"
      english_name: "Goodwill"
      name: "영업권"
      statement: [balance_sheet]
      category: [asset, non_current_asset, intangible, goodwill]
      sign: positive
      parent: BS_NCA_INTANGIBLE
      aliases: ["합병영업권"]
      mappings:
        dart: ["ifrs-full_Goodwill"]
        ifrs: ["Goodwill"]
        usgaap: ["Goodwill"]
      description: "기업결합 시 인수가액이 피인수 순자산 공정가액을 초과한 금액."

    BS_NCA_ROU:
      id: BS_NCA_ROU
      korean_name: "사용권자산"
      english_name: "Right-of-Use Asset"
      name: "사용권자산"
      statement: [balance_sheet]
      category: [asset, non_current_asset, lease]
      sign: positive
      parent: BS_NCA_TOTAL
      aliases: ["리스사용권자산"]
      mappings:
        dart: ["ifrs-full_RightofuseAssets"]
        ifrs: ["RightOfUseAssets"]
        usgaap: ["RightOfUseAssets"]
      description: "IFRS 16 임차에서 인식되는 사용권 자산."

    BS_NCA_DTA:
      id: BS_NCA_DTA
      korean_name: "이연법인세자산"
      english_name: "Deferred Tax Assets"
      name: "이연법인세자산"
      statement: [balance_sheet]
      category: [asset, non_current_asset, deferred_tax]
      sign: positive
      parent: BS_NCA_TOTAL
      aliases: ["이연법인세자산(순액)"]
      mappings:
        dart: ["ifrs-full_DeferredTaxAssets"]
        ifrs: ["DeferredTaxAssets"]
        usgaap: ["DeferredTaxAssetsNet"]

    BS_NCA_OTHER:
      id: BS_NCA_OTHER
      korean_name: "기타비유동자산"
      english_name: "Other Non-current Assets"
      name: "기타비유동자산"
      statement: [balance_sheet]
      category: [asset, non_current_asset, other]
      sign: positive
      parent: BS_NCA_TOTAL
      aliases: ["장성보증금", "기타의 비유동자산"]
      mappings:
        dart: ["ifrs-full_OtherNoncurrentAssets"]
        ifrs: ["OtherNonCurrentAssets"]
        usgaap: ["OtherAssetsNoncurrent"]

    # =========================================================================
    # 재무상태표 — 부채
    # =========================================================================
    BS_L_TOTAL:
      id: BS_L_TOTAL
      korean_name: "부채총계"
      english_name: "Total Liabilities"
      name: "부채총계"
      statement: [balance_sheet]
      category: [liability, total]
      sign: positive
      children: [BS_CL_TOTAL, BS_NCL_TOTAL]
      formula: "BS_CL_TOTAL + BS_NCL_TOTAL"
      ratios: [debt_ratio, debt_to_equity, equity_ratio]
      affects: [Leverage]
      aliases: ["총부채", "부채의 총액"]
      mappings:
        dart: ["ifrs-full_Liabilities"]
        ifrs: ["Liabilities"]
        usgaap: ["Liabilities"]

    BS_CL_TOTAL:
      id: BS_CL_TOTAL
      korean_name: "유동부채"
      english_name: "Current Liabilities"
      name: "유동부채"
      statement: [balance_sheet]
      category: [liability, current_liability, working_capital]
      sign: positive
      parent: BS_L_TOTAL
      children: [BS_CL_ST_BORROW, BS_CL_ST_BOND, BS_CL_AP, BS_CL_ADV, BS_CL_ST_PROV, BS_CL_PAYABLE, BS_CL_DIV_PAYABLE, BS_CL_ST_TAX, BS_CL_ST_DERIV, BS_CL_OTHER]
      ratios: [current_ratio, quick_ratio, cash_ratio, working_capital]
      affects: [WorkingCapital]
      aliases: ["유동부채의 총액"]
      mappings:
        dart: ["ifrs-full_CurrentLiabilities"]
        ifrs: ["CurrentLiabilities"]
        usgaap: ["LiabilitiesCurrent"]

    BS_CL_ST_BORROW:
      id: BS_CL_ST_BORROW
      korean_name: "단기차입금"
      english_name: "Short-term Borrowings"
      name: "단기차입금"
      statement: [balance_sheet]
      category: [liability, current_liability, debt, interest_bearing]
      sign: positive
      parent: BS_CL_TOTAL
      ratios: [debt_ratio, debt_to_equity]
      affects: [Leverage, InterestCoverage]
      cashflow_mapping: [financing]
      aliases: ["단기차입금 및 하자보수충당금"]
      mappings:
        dart: ["ifrs-full_ShorttermBorrowings"]
        ifrs: ["ShortTermBorrowings"]
        usgaap: ["ShortTermBorrowings"]
      description: "만기 1년 이내 차입금. 이자비용 발생."

    BS_CL_ST_BOND:
      id: BS_CL_ST_BOND
      korean_name: "단기사채"
      english_name: "Current Portion of Bonds Payable"
      name: "단기사채"
      statement: [balance_sheet]
      category: [liability, current_liability, debt, interest_bearing]
      sign: positive
      parent: BS_CL_TOTAL
      affects: [Leverage]
      cashflow_mapping: [financing]
      aliases: ["사채(유동)"]

    BS_CL_AP:
      id: BS_CL_AP
      korean_name: "매입채무"
      english_name: "Accounts Payable"
      name: "매입채무"
      statement: [balance_sheet]
      category: [liability, current_liability, working_capital, payable]
      sign: positive
      parent: BS_CL_TOTAL
      ratios: [payable_turnover, cash_conversion_cycle, current_ratio]
      affects: [WorkingCapital, OCF]
      cashflow_mapping: [operating]
      aliases: ["외상매입금", "미지급금(매입)"]
      mappings:
        dart: ["ifrs-full_TradeAndOtherCurrentPayables"]
        ifrs: ["TradeAndOtherPayables"]
        usgaap: ["AccountsPayableCurrent"]

    BS_CL_ADV:
      id: BS_CL_ADV
      korean_name: "선수금"
      english_name: "Advances from Customers"
      name: "선수금"
      statement: [balance_sheet]
      category: [liability, current_liability, deferred_revenue]
      sign: positive
      parent: BS_CL_TOTAL
      aliases: ["선수수익"]
      description: "상품·용역 인도 전 수취한 대가."

    BS_CL_ST_PROV:
      id: BS_CL_ST_PROV
      korean_name: "유동충당부채"
      english_name: "Current Provisions"
      name: "유동충당부채"
      statement: [balance_sheet]
      category: [liability, current_liability, provision]
      sign: positive
      parent: BS_CL_TOTAL
      aliases: ["충당부채(유동)"]
      mappings:
        dart: ["ifrs-full_CurrentProvisions"]
        ifrs: ["CurrentProvisions"]

    BS_CL_PAYABLE:
      id: BS_CL_PAYABLE
      korean_name: "미지급금"
      english_name: "Other Payables"
