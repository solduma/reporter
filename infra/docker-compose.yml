# reporter 웹서비스 전용 인프라. compose project 이름을 'reporter' 로 고정해
# 기존 analytics-agent(weaviate 8085 / redis 6379 / minio 9000-9001) 및
# standalone postgres(5432) 와 포트·볼륨·네트워크가 섞이지 않도록 완전 격리한다.
name: reporter

networks:
  reporter-net:
    driver: bridge

volumes:
  reporter-pgdata:
  reporter-redisdata:
  reporter-miniodata:

services:
  reporter-postgres:
    image: postgres:16
    container_name: reporter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reporter}
      POSTGRES_USER: ${POSTGRES_USER:-reporter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reporter}
    ports:
      - "5433:5432"  # host 5433 → 컨테이너 표준 5432 (5432 는 standalone 이 점유)
    volumes:
      - reporter-pgdata:/var/lib/postgresql/data
    networks:
      - reporter-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reporter} -d ${POSTGRES_DB:-reporter}"]
      interval: 5s
      timeout: 5s
      retries: 10

  reporter-redis:
    image: redis:7-alpine
    container_name: reporter-redis
    restart: unless-stopped
    ports:
      - "6380:6379"  # 6379 는 analytics-agent 가 점유
    volumes:
      - reporter-redisdata:/data
    networks:
      - reporter-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  reporter-minio:
    image: minio/minio
    container_name: reporter-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-reporter}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-reporter-secret}
    ports:
      - "9010:9000"  # API — 9000-9001 은 analytics-agent 가 점유
      - "9011:9001"  # Console
    volumes:
      - reporter-miniodata:/data
    networks:
      - reporter-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 수집 스케줄러(launchd 대체). 평일 09-19시 매 30분 ingest. 별도 프로세스라
  # API 재시작·멀티워커와 무관하게 배치 1회를 보장한다. 컨테이너 내부에서는
  # 서비스명:표준포트로 접속한다(호스트 매핑 포트 5433/6380/9010 아님).
  reporter-worker:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: reporter-worker
    restart: unless-stopped
    # --no-sync: 이미지 빌드 시 설치한 의존성을 그대로 쓴다. 매 부팅마다 PyPI 재설치
    # (dev 그룹 재설치·네트워크 의존)를 막아 restart 안정성을 높인다.
    command: ["uv", "run", "--no-sync", "reporter-worker"]
    environment:
      POSTGRES_URL: postgresql+psycopg://${POSTGRES_USER:-reporter}:${POSTGRES_PASSWORD:-reporter}@reporter-postgres:5432/${POSTGRES_DB:-reporter}
      REDIS_URL: redis://reporter-redis:6379/0
      MINIO_ENDPOINT: reporter-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-reporter}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-reporter-secret}
      MINIO_BUCKET: reporter-pdfs
      OLLAMA_HOST: ${OLLAMA_HOST:-https://ollama.com}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-glm-5.2:cloud}
      INSIGHT_MODEL: ${INSIGHT_MODEL:-glm-5.2:cloud}
      # 재무·보고서·EV/EBITDA 백필이 DART/KRX 를 호출한다(없으면 배치가 조용히 스킵됨).
      DART_API_KEY: ${DART_API_KEY:-}
      KRX_API: ${KRX_API:-}
      # 경제 캘린더 배치가 FRED(미국 매크로 발표일·실적치)를 호출한다(없으면 고정일정만).
      FRED_API_KEY: ${FRED_API_KEY:-}
      # 딥다이브 큐(worker 실행)의 웹 리서치가 네이버 검색 API 를 호출한다(없으면 웹검색만 비활성).
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      # 호스트 CLI(launchd)가 발송 기록을 쓰는 스풀을 워커가 읽어 broadcast 테이블로 흡수한다.
      # 아래 볼륨 마운트 경로와 일치. WORKDIR/parents 가정에 흔들리지 않게 명시.
      BROADCAST_SPOOL: /app/logs/broadcasts.jsonl
    volumes:
      # 호스트 repo logs ↔ 컨테이너 /app/logs 공유(브로드캐스트 스풀 공유용).
      - ../logs:/app/logs
    depends_on:
      reporter-postgres:
        condition: service_healthy
      reporter-minio:
        condition: service_healthy
    networks:
      - reporter-net
